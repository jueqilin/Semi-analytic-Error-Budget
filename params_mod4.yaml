telescope:
  # Number of actuators
  N_act: 2 
  # Primary mirror diameter in [m]
  telescope_diam: 38.5    

atmosphere: 
  #Outer scale in [m]. 
  Outer_scale: 25           
  #Wind speed in [m/s] 
  Wind_Speed: 8
  #seeing in [arcsec]
  Seeing: 0.8

wavefront_sensor:
  # Number whose square root is taken to compute the ‘Excess noise factor’(F_excess_noise = np.sqrt(value_for_F_excess_noise)).
  value_for_F_excess_noise: 1
  # Sky background in [photo-electrons] 
  sky_backgr: 0
  # Dark current in [photo-electrons]  
  dark_curr: 0  
  # Readout noise in [photo-electrons]             
  noise_readout: 5   

files:
  # questo puo' essere il path della matrice di ricostruzione o del vettore dei noise propagation coefficients
  file_path_reconstruction_matrix1: "src/file_fits/ANDES/ANDES_pyr100x100_wl850_fv2.1_slInten_ma3_bn1_mn4000_noise_prop_coeff.fits"
  # file path della PSD_windshake (tip e tilt)
  file_path_PSD_windshake1: "src/file_fits/ANDES/morfeo_windshake8ms_psd_2022_1k.fits"
  # file path dei modelli di modulazione (mod0 e mod4)
  file_optg: ["src/file_fits/ANDES/ANDES_og_mod0.fits", "src/file_fits/ANDES/ANDES_og_mod4.fits"] 
  # file path delle sigma slopes da aliasing
  file_path_sigmaslope: "src/file_fits/ANDES/slopes_rms_time_avg_all.fits"

polynomial_coefficients_array:
  # Array of denominator polynomial coefficients of the W function.
  d_1: [1]
  # Array of denominator polynomial coefficients of the M function.
  d_3: [1]
  # Array of numerator polynomial coefficients of the W function (viene da: n1 = np.array [rho_sens],
  # ma una scrittura dove si fa riferimento ad un parametro non è supportata da file yaml).
  n_1: [1] 
  # Array of numerator polynomial coefficients of the R function.
  n_2: [1]
  # Array of numerator polynomial coefficients of the M function.
  n_3: [1]

frequency_ranges:
  # Temporal frequencies in [Hz] (abbiamo che: temporal_freqs = np.logspace(-3, 3, 1000); in yaml non è supportato
  # nè np.linspace nè np.logspace. Quindi devo costruire il vettore di temporal_freqs direttamente in python)
  temporal_freqs_min: -3
  temporal_freqs_max: 3
  temporal_freqs_n: 1000
  # Angular frequency array corresponding to the temporal frequencies (qui devo fare direttamente il calcolo in python 
  # sapendo che: omega_temporal_freqs = 2 * np.pi * temporal_freqs )

loop parameters:
  # Sampling time in [s]
  sampling_time: 0.001   
  # Gain (abbiamo che: gain_ = np.linspace(0, (valore dipendente dal total delay), 2). Costruisco il vettore di gain_ direttamente in python)                        
  gain_min: 0.01  
  gain_n: 2
  # Sensor sensitivity                   
  sensor_sensitivity: 1 
  # Total delay due to the wavefront sensor, real-time computer, and adaptive secondary mirror in [s] 
  total_delay: 3  
  #coeff for modulation radius
  Coeff_Modulation_Radius: 3
  #maximum radial order corrected
  Maximum_Radial_Order_Corrected: 88

pixel_params:
  # Number of photons for second for collecting area
  flux_photons: 9.0e12
  # Frame rate for magnitudo between 6 and 12 in [Hz]
  frm_rate:  1000
  # Magnitudo 
  magn: 7
  # Number of sub apertures on the diameter of the telescope
  number_of_sub: 100 
  # Collecting area of ELT in [m^2]
  collect_area: 1000
  # Pixel position 
  pixel_position:  [1, 0, 0, 0]     
  

system definition:
  #ANDES or SOUL
  System: "ANDES"

display:
  # Enable/disable all visualization blocks
  enabled: true
  # Modes shown in summary plots (null => automatic selection)
  summary_modes_to_plot: null
  # Enable legacy plots/checks in addition to the new summary display
  show_legacy_plots: true
